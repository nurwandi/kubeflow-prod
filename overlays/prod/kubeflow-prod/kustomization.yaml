# ============================================================
# Category N: Centraldashboard fixes
# ============================================================
# N1: PROFILES_KFAM_SERVICE_HOST env var points to dev namespace
- target:
    kind: Deployment
    name: centraldashboard
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: centraldashboard
    spec:
      template:
        spec:
          containers:
          - name: centraldashboard
            env:
            - name: PROFILES_KFAM_SERVICE_HOST
              value: profiles-kfam.kubeflow-prod

# ============================================================
# N2: RoleBinding subject namespace fix
# ============================================================
# namespace transformer missed subjects[].namespace in this RoleBinding
- target:
    kind: RoleBinding
    name: centraldashboard
  patch: |-
    - op: replace
      path: /subjects/0/namespace
      value: kubeflow-prod

# ============================================================
# Category M: Spark Operator hardcoded namespace/webhook-name args
# ============================================================
# spark-operator embeds namespace and webhook names in container args
# which the kustomize namespace transformer does not rewrite.

# M1: spark-operator-webhook — fix 5 args
- target:
    kind: Deployment
    name: spark-operator-webhook
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: spark-operator-webhook
    spec:
      template:
        spec:
          containers:
          - name: spark-operator-webhook
            args:
            - webhook
            - start
            - --zap-log-level=info
            - '--namespaces=""'
            - --webhook-secret-name=spark-operator-webhook-certs
            - --webhook-secret-namespace=kubeflow-prod
            - --webhook-svc-name=spark-operator-webhook-svc
            - --webhook-svc-namespace=kubeflow-prod
            - --webhook-port=9443
            - --mutating-webhook-name=prod-spark-operator-webhook
            - --validating-webhook-name=prod-spark-operator-webhook
            - --enable-metrics=true
            - --metrics-bind-address=:8080
            - --metrics-endpoint=/metrics
            - --metrics-prefix=
            - --metrics-labels=app_type
            - --leader-election=true
            - --leader-election-lock-name=spark-operator-webhook-lock
            - --leader-election-lock-namespace=kubeflow-prod

# M2: spark-operator-controller — fix leader-election-lock-namespace
- target:
    kind: Deployment
    name: spark-operator-controller
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: spark-operator-controller
    spec:
      template:
        spec:
          containers:
          - name: spark-operator-controller
            args:
            - controller
            - start
            - --zap-log-level=info
            - '--namespaces=""'
            - --controller-threads=10
            - --enable-ui-service=true
            - --enable-metrics=true
            - --metrics-bind-address=:8080
            - --metrics-endpoint=/metrics
            - --metrics-prefix=
            - --metrics-labels=app_type
            - "--metrics-job-start-latency-buckets=30,60,90,120,150,180,210,240,270,300"
            - --leader-election=true
            - --leader-election-lock-name=spark-operator-controller-lock
            - --leader-election-lock-namespace=kubeflow-prod
            - --workqueue-ratelimiter-bucket-qps=50
            - --workqueue-ratelimiter-bucket-size=500
            - --workqueue-ratelimiter-max-delay=6h
            - --driver-pod-creation-grace-period=10s
            - --max-tracked-executor-per-app=1000
