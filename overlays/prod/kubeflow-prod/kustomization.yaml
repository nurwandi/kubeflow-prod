apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubeflow-prod

sortOptions:
  order: legacy
  legacySortOptions:
    orderFirst:
    - Namespace
    - ResourceQuota
    - StorageClass
    - CustomResourceDefinition
    - MutatingWebhookConfiguration
    - ServiceAccount
    - PodSecurityPolicy
    - NetworkPolicy
    - Role
    - ClusterRole
    - RoleBinding
    - ClusterRoleBinding
    - ConfigMap
    - Secret
    - Endpoints
    - Service
    - LimitRange
    - PriorityClass
    - PersistentVolume
    - PersistentVolumeClaim
    - Deployment
    - StatefulSet
    - CronJob
    - PodDisruptionBudget
    orderLast:
    - ValidatingWebhookConfiguration

resources:
- namespace.yaml
- oauth2-proxy-vs.yaml
# Cert-Manager Kubeflow Issuer
- ../../../common/cert-manager/kubeflow-issuer/base
# NetworkPolicies
- ../../../common/networkpolicies/base
# Kubeflow Roles
- ../../../common/kubeflow-roles/base
# Kubeflow Istio Resources
- ../../../common/istio/kubeflow-istio-resources/base
# Kubeflow Pipelines
- ../../../applications/pipeline/upstream/env/cert-manager/platform-agnostic-multi-user
# Katib
- ../../../applications/katib/upstream/installs/katib-with-kubeflow
# Central Dashboard
- ../../../applications/centraldashboard/overlays/oauth2-proxy
# Admission Webhook
- ../../../applications/admission-webhook/upstream/overlays/cert-manager
# Jupyter Web App
- ../../../applications/jupyter/jupyter-web-app/upstream/overlays/istio
# Notebook Controller
- ../../../applications/jupyter/notebook-controller/upstream/overlays/kubeflow
# Profiles + KFAM with PSS
- ../../../applications/profiles/pss
# PVC Viewer
- ../../../applications/pvcviewer-controller/upstream/base
# Volumes Web App
- ../../../applications/volumes-web-app/upstream/overlays/istio
# Tensorboards Controller
- ../../../applications/tensorboard/tensorboard-controller/upstream/overlays/kubeflow
# Tensorboard Web App
- ../../../applications/tensorboard/tensorboards-web-app/upstream/overlays/istio
# Training Operator
- ../../../applications/training-operator/upstream/overlays/kubeflow
# User namespace
- ../../../common/user-namespace/base
# KServe
- ../../../applications/kserve/kserve
- ../../../applications/kserve/models-web-app/overlays/kubeflow
# Spark Operator
- ../../../applications/spark/spark-operator/overlays/kubeflow

patches:
# ============================================================
# A: Gateway selector → ingressgateway-prod
# ============================================================
- target:
    kind: Gateway
    name: kubeflow-gateway
  patch: |-
    - op: replace
      path: /spec/selector/istio
      value: ingressgateway-prod

# ============================================================
# B: NodeSelector → all pods on nsqsurv (.101)
# ============================================================
- target:
    kind: Deployment
  patch: |-
    - op: add
      path: /spec/template/spec/nodeSelector
      value:
        kubernetes.io/hostname: nsqsurv
- target:
    kind: StatefulSet
  patch: |-
    - op: add
      path: /spec/template/spec/nodeSelector
      value:
        kubernetes.io/hostname: nsqsurv

# ============================================================
# C: DestinationRule FQDN → .kubeflow-prod.svc.cluster.local
# ============================================================
- target:
    kind: DestinationRule
    name: jupyter-web-app
  patch: |-
    - op: replace
      path: /spec/host
      value: jupyter-web-app-service.kubeflow-prod.svc.cluster.local
- target:
    kind: DestinationRule
    name: metadata-grpc-service
  patch: |-
    - op: replace
      path: /spec/host
      value: metadata-grpc-service.kubeflow-prod.svc.cluster.local
- target:
    kind: DestinationRule
    name: ml-pipeline
  patch: |-
    - op: replace
      path: /spec/host
      value: ml-pipeline.kubeflow-prod.svc.cluster.local
- target:
    kind: DestinationRule
    name: ml-pipeline-minio
  patch: |-
    - op: replace
      path: /spec/host
      value: minio-service.kubeflow-prod.svc.cluster.local
- target:
    kind: DestinationRule
    name: ml-pipeline-mysql
  patch: |-
    - op: replace
      path: /spec/host
      value: mysql.kubeflow-prod.svc.cluster.local
- target:
    kind: DestinationRule
    name: ml-pipeline-ui
  patch: |-
    - op: replace
      path: /spec/host
      value: ml-pipeline-ui.kubeflow-prod.svc.cluster.local
- target:
    kind: DestinationRule
    name: ml-pipeline-visualizationserver
  patch: |-
    - op: replace
      path: /spec/host
      value: ml-pipeline-visualizationserver.kubeflow-prod.svc.cluster.local
- target:
    kind: DestinationRule
    name: tensorboards-web-app
  patch: |-
    - op: replace
      path: /spec/host
      value: tensorboards-web-app-service.kubeflow-prod.svc.cluster.local
- target:
    kind: DestinationRule
    name: volumes-web-app
  patch: |-
    - op: replace
      path: /spec/host
      value: volumes-web-app-service.kubeflow-prod.svc.cluster.local

# ============================================================
# D: VirtualService FQDN → .kubeflow-prod.svc.cluster.local
# ============================================================
- target:
    kind: VirtualService
    name: centraldashboard
  patch: |-
    - op: replace
      path: /spec/http/0/route/0/destination/host
      value: centraldashboard.kubeflow-prod.svc.cluster.local
- target:
    kind: VirtualService
    name: metadata-grpc
  patch: |-
    - op: replace
      path: /spec/http/0/route/0/destination/host
      value: metadata-envoy-service.kubeflow-prod.svc.cluster.local
- target:
    kind: VirtualService
    name: kserve-models-web-app
  patch: |-
    - op: replace
      path: /spec/gateways/0
      value: kubeflow-prod/kubeflow-gateway
    - op: replace
      path: /spec/http/0/route/0/destination/host
      value: kserve-models-web-app.kubeflow-prod.svc.cluster.local

# ============================================================
# E: Certificate FQDN → .kubeflow-prod.svc
# ============================================================
- target:
    kind: Certificate
    name: serving-cert
  patch: |-
    - op: replace
      path: /spec/commonName
      value: kserve-webhook-server-service.kubeflow-prod.svc
    - op: replace
      path: /spec/dnsNames/0
      value: kserve-webhook-server-service.kubeflow-prod.svc

# ============================================================
# F: AuthorizationPolicy SPIFFE → ns/kubeflow-prod/sa/
# ============================================================
- target:
    kind: AuthorizationPolicy
    name: minio-service
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline
    - op: replace
      path: /spec/rules/1/from/0/source/principals/0
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-ui
- target:
    kind: AuthorizationPolicy
    name: ml-pipeline
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline
    - op: replace
      path: /spec/rules/0/from/0/source/principals/1
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-ui
    - op: replace
      path: /spec/rules/0/from/0/source/principals/2
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-persistenceagent
    - op: replace
      path: /spec/rules/0/from/0/source/principals/3
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-scheduledworkflow
    - op: replace
      path: /spec/rules/0/from/0/source/principals/4
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-viewer-crd-service-account
    - op: replace
      path: /spec/rules/0/from/0/source/principals/5
      value: cluster.local/ns/kubeflow-prod/sa/kubeflow-pipelines-cache
- target:
    kind: AuthorizationPolicy
    name: ml-pipeline-visualizationserver
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline
    - op: replace
      path: /spec/rules/0/from/0/source/principals/1
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-ui
    - op: replace
      path: /spec/rules/0/from/0/source/principals/2
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-persistenceagent
    - op: replace
      path: /spec/rules/0/from/0/source/principals/3
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-scheduledworkflow
    - op: replace
      path: /spec/rules/0/from/0/source/principals/4
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-viewer-crd-service-account
    - op: replace
      path: /spec/rules/0/from/0/source/principals/5
      value: cluster.local/ns/kubeflow-prod/sa/kubeflow-pipelines-cache
- target:
    kind: AuthorizationPolicy
    name: mysql
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline
    - op: replace
      path: /spec/rules/0/from/0/source/principals/1
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-ui
    - op: replace
      path: /spec/rules/0/from/0/source/principals/2
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-persistenceagent
    - op: replace
      path: /spec/rules/0/from/0/source/principals/3
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-scheduledworkflow
    - op: replace
      path: /spec/rules/0/from/0/source/principals/4
      value: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-viewer-crd-service-account
    - op: replace
      path: /spec/rules/0/from/0/source/principals/5
      value: cluster.local/ns/kubeflow-prod/sa/kubeflow-pipelines-cache
    - op: replace
      path: /spec/rules/0/from/0/source/principals/6
      value: cluster.local/ns/kubeflow-prod/sa/metadata-grpc-server
- target:
    kind: AuthorizationPolicy
    name: profiles-kfam
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/kubeflow-prod/sa/centraldashboard

# ============================================================
# G: Web-facing AuthorizationPolicies → prod ingressgateway SA
# ============================================================
# These ALLOW policies control which SA can access web-facing services
# via the ingressgateway. Must point to prod ingressgateway SA.
- target:
    kind: AuthorizationPolicy
    name: central-dashboard
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/istio-system/sa/istio-ingressgateway-prod-service-account
- target:
    kind: AuthorizationPolicy
    name: jupyter-web-app
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/istio-system/sa/istio-ingressgateway-prod-service-account
- target:
    kind: AuthorizationPolicy
    name: katib-ui
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/istio-system/sa/istio-ingressgateway-prod-service-account
- target:
    kind: AuthorizationPolicy
    name: kserve-models-web-app
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/istio-system/sa/istio-ingressgateway-prod-service-account
- target:
    kind: AuthorizationPolicy
    name: tensorboards-web-app
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/istio-system/sa/istio-ingressgateway-prod-service-account
- target:
    kind: AuthorizationPolicy
    name: volumes-web-app
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/istio-system/sa/istio-ingressgateway-prod-service-account

# G2: ml-pipeline-ui AuthorizationPolicy → prod ingressgateway SA
- target:
    kind: AuthorizationPolicy
    name: ml-pipeline-ui
  patch: |-
    - op: replace
      path: /spec/rules/0/from/0/source/principals/0
      value: cluster.local/ns/istio-system/sa/istio-ingressgateway-prod-service-account

# ============================================================
# H: ConfigMap inferenceservice-config → kubeflow-prod gateway
# ============================================================
- target:
    kind: ConfigMap
    name: inferenceservice-config
  patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: inferenceservice-config
    data:
      ingress: |-
        {
          "enableGatewayApi": false,
          "kserveIngressGateway": "kserve/kserve-ingress-gateway",
          "ingressGateway": "kubeflow-prod/kubeflow-gateway",
          "localGateway": "knative-serving/knative-local-gateway",
          "localGatewayService": "knative-local-gateway.istio-system.svc.cluster.local",
          "ingressDomain": "example.com",
          "ingressClassName": "istio",
          "domainTemplate": "{{ .Name }}-{{ .Namespace }}.{{ .IngressDomain }}",
          "urlScheme": "http",
          "disableIstioVirtualHost": false,
          "disableIngressCreation": false
        }

# ============================================================
# H2: ConfigMap notebook-controller-config → kubeflow-prod gateway
# ============================================================
- target:
    kind: ConfigMap
    name: notebook-controller-config
  patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: notebook-controller-config
    data:
      ISTIO_GATEWAY: kubeflow-prod/kubeflow-gateway

# ============================================================
# H3: ConfigMap tensorboard-controller-config → kubeflow-prod gateway
# ============================================================
- target:
    kind: ConfigMap
    name: tensorboard-controller-config
  patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: tensorboard-controller-config
    data:
      ISTIO_GATEWAY: kubeflow-prod/kubeflow-gateway

# ============================================================
# H4: ConfigMap profiles-config → kubeflow-prod SPIFFE principals
# ============================================================
- target:
    kind: ConfigMap
    name: profiles-config
  patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: profiles-config
    data:
      ISTIO_INGRESS_GATEWAY_PRINCIPAL: cluster.local/ns/istio-system/sa/istio-ingressgateway-prod-service-account
      KFP_UI_PRINCIPAL: cluster.local/ns/kubeflow-prod/sa/ml-pipeline-ui
      NOTEBOOK_CONTROLLER_PRINCIPAL: cluster.local/ns/kubeflow-prod/sa/notebook-controller-service-account

# ============================================================
# H6: ConfigMap pipeline-install-config → prod ingressgateway SA
# ============================================================
- target:
    kind: ConfigMap
    name: pipeline-install-config
  patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: pipeline-install-config
    data:
      ISTIO_INGRESS_GATEWAY_PRINCIPAL: cluster.local/ns/istio-system/sa/istio-ingressgateway-prod-service-account

# ============================================================
# H5: ConfigMap sync.py → kubeflow-prod SPIFFE principal
# ============================================================
- target:
    kind: ConfigMap
    name: kubeflow-pipelines-profile-controller-code
  path: sync-py-patch.yaml

# ============================================================
# I: Katib webhook matchCondition → kubeflow-prod SA
# ============================================================
- target:
    kind: MutatingWebhookConfiguration
    name: katib.kubeflow.org
  patch: |-
    - op: replace
      path: /webhooks/1/matchConditions/0/expression
      value: 'request.userInfo.username != "system:serviceaccount:kubeflow-prod:katib-controller"'

# ============================================================
# J+K: Webhook renames (prod- prefix) + KServe cert annotation fixes
# ============================================================
# --- MutatingWebhookConfigurations ---
- target:
    kind: MutatingWebhookConfiguration
    name: admission-webhook-mutating-webhook-configuration
