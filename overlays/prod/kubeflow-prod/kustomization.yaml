  patch: |-
    - op: replace
      path: /metadata/name
      value: prod-inferenceservice.serving.kserve.io
    - op: replace
      path: /metadata/annotations/cert-manager.io~1inject-ca-from
      value: kubeflow-prod/serving-cert
- target:
    kind: MutatingWebhookConfiguration
    name: katib.kubeflow.org
  patch: |-
    - op: replace
      path: /metadata/name
