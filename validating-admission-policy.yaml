## Prevent race conditions between dev (kubeflow) and prod (kubeflow-prod) controllers.
## Both profile/notebook controllers watch cluster-wide and overwrite each other's
## VirtualServices and AuthorizationPolicies in user namespaces.
##
## Policy 1: Block dev controllers (kubeflow SA) from prod user namespaces
## Policy 2: Block prod controllers (kubeflow-prod SA) from dev user namespaces
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: block-dev-controllers-in-prod-ns
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: ["networking.istio.io"]
      apiVersions: ["*"]
      operations: ["CREATE", "UPDATE"]
      resources: ["virtualservices"]
    - apiGroups: ["security.istio.io"]
      apiVersions: ["*"]
      operations: ["CREATE", "UPDATE"]
      resources: ["authorizationpolicies"]
  matchConditions:
  - name: only-production-namespace
    expression: "object.metadata.namespace == 'production-namespace'"
  - name: only-dev-service-accounts
    expression: "request.userInfo.username.startsWith('system:serviceaccount:kubeflow:')"
  validations:
  - expression: "false"
    message: "Dev kubeflow controllers cannot modify Istio resources in production-namespace."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: block-dev-controllers-in-prod-ns
spec:
  policyName: block-dev-controllers-in-prod-ns
  validationActions: [Deny]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: block-prod-controllers-in-dev-ns
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: ["networking.istio.io"]
      apiVersions: ["*"]
      operations: ["CREATE", "UPDATE"]
      resources: ["virtualservices"]
    - apiGroups: ["security.istio.io"]
      apiVersions: ["*"]
      operations: ["CREATE", "UPDATE"]
      resources: ["authorizationpolicies"]
  matchConditions:
  - name: only-dev-user-namespaces
    expression: "object.metadata.namespace.startsWith('kubeflow-user')"
  - name: only-prod-service-accounts
    expression: "request.userInfo.username.startsWith('system:serviceaccount:kubeflow-prod:')"
  validations:
  - expression: "false"
    message: "Prod kubeflow-prod controllers cannot modify Istio resources in dev user namespaces."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: block-prod-controllers-in-dev-ns
spec:
  policyName: block-prod-controllers-in-dev-ns
  validationActions: [Deny]
